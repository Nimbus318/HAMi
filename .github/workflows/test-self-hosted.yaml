name: Test self-hosted-runner

on:
  push:
    # Exclude branches created by Dependabot to avoid triggering current workflow
    # for PRs initiated by Dependabot.
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    paths:
      - "charts/**"

jobs:
  e2e:
    # The self-hosted runner pool exists in Project-HAMi/HAMi, not in forks.
    # Without this guard, fork pushes sit queued forever waiting for a runner.
    if: github.repository == 'Project-HAMi/HAMi'
    runs-on: self-hosted
    steps:
      - name: e2e test
        # https://github.com/actions/virtual-environments/issues/709
        run: |
          echo "Need to add e2e test"
